<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kamran Akram Films</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #f8f6f2; color: #1e1e1e; padding: 1.5rem; }
        .container { max-width: 1300px; margin: 0 auto; }

        /* Header */
        .brand { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; padding-bottom: 1.5rem; border-bottom: 2px solid #d4c9b8; margin-bottom: 2rem; }
        .brand h1 { font-size: 2.2rem; font-weight: 400; letter-spacing: 2px; color: #2c2b28; }
        .brand h1 i { color: #b78c5a; margin-right: 8px; }
        .brand .sub { font-size: 1rem; background: #eae5db; padding: 0.4rem 1.2rem; border-radius: 40px; color: #3d3a34; display: flex; align-items: center; gap: 10px; }
        .admin-link { color: #b78c5a; text-decoration: none; font-size: 0.9rem; }

        /* Login Overlay */
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .login-overlay.active { display: flex; }
        .login-box { background: white; padding: 2.5rem; border-radius: 24px; max-width: 400px; width: 90%; }
        .login-box h2 { margin-bottom: 1.5rem; color: #2c2b28; }
        .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #d4c9b8; border-radius: 8px; font-size: 1rem; }
        .login-box .btn { width: 100%; padding: 0.8rem; }
        .login-error { color: #e74c3c; font-size: 0.9rem; margin-top: 0.5rem; display: none; }

        /* Admin Panel */
        .admin-panel { background: white; padding: 2rem; border-radius: 24px; margin-bottom: 2rem; border: 1px solid #e3ddd2; display: none; }
        .admin-panel.visible { display: block; }
        .admin-panel h2 { margin-bottom: 1rem; color: #2c2b28; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .admin-header .btn-logout { background: #e74c3c; color: white; border: none; padding: 0.4rem 1.2rem; border-radius: 40px; cursor: pointer; font-size: 0.85rem; }

        .form-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .form-row input, .form-row select, .form-row textarea { padding: 0.6rem; border: 1px solid #d4c9b8; border-radius: 8px; font-size: 0.9rem; }
        .form-row textarea { resize: vertical; min-height: 60px; }
        .photo-upload { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .photo-upload input[type="file"] { display: none; }
        .photo-preview { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
        .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #e3ddd2; }
        .btn { background: #2c2b28; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 40px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn:hover { background: #b78c5a; }
        .btn-danger { background: #c0392b; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #2ecc71; }

        /* Filters */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 0.8rem 1.2rem; background: white; padding: 1rem 1.5rem; border-radius: 60px; margin-bottom: 2.5rem; align-items: center; border: 1px solid #e3ddd2; }
        .filter-btn { background: transparent; border: none; padding: 0.3rem 1.2rem; border-radius: 40px; font-size: 0.95rem; cursor: pointer; background: #f0ede7; color: #3d3a34; }
        .filter-btn.active { background: #2c2b28; color: white; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

        .card { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #ede8df; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 14px 28px rgba(0,0,0,0.04); }
        .card .main-image { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #f0ede7; }
        .card .category-tag { font-size: 0.7rem; text-transform: uppercase; background: #eae3d7; padding: 0.2rem 0.8rem; border-radius: 40px; display: inline-block; margin-bottom: 0.8rem; }
        .card h3 { font-weight: 600; font-size: 1.3rem; margin-bottom: 0.3rem; }
        .card .condition { font-size: 0.9rem; color: #5b5549; margin-bottom: 0.2rem; }
        .card .rating { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; margin: 0.5rem 0; }
        .card .rating i { color: #f5b342; }
        .card .price { font-size: 1.7rem; font-weight: 500; color: #1f4f3b; }
        .card .price small { font-size: 0.9rem; color: #6b6356; }
        .card .desc { font-size: 0.9rem; color: #5f594c; margin: 0.3rem 0; }
        .card .meta { display: flex; justify-content: space-between; border-top: 1px dashed #ddd6cb; margin-top: 0.8rem; padding-top: 0.8rem; font-size: 0.8rem; color: #7d7566; }
        .card .admin-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .card .admin-actions button { padding: 0.3rem 0.8rem; border: none; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }

        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; background: #4CAF50; color: white; }
        .status-badge.inactive { background: #e74c3c; }

        .empty-state { text-align: center; padding: 4rem 1rem; background: white; border-radius: 40px; border: 1px solid #e3ddd2; }
        .loader { text-align: center; padding: 4rem 0; color: #5f594c; }
        .loader i { font-size: 2.4rem; color: #b78c5a; }

        .footer { margin-top: 4rem; border-top: 1px solid #d4c9b8; padding-top: 2rem; display: flex; flex-wrap: wrap; justify-content: space-between; color: #4f4a3f; font-size: 0.9rem; }

        @media (max-width: 600px) { .brand h1 { font-size: 1.8rem; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="brand">
        <h1><i class="fas fa-camera-retro"></i> Kamran Akram Films</h1>
        <div style="display:flex; align-items:center; gap:1rem;">
            <div class="sub"><i class="fas fa-map-pin"></i> Pakistan · PKR</div>
            <a href="#" onclick="showLogin()" class="admin-link" id="loginLink"><i class="fas fa-lock"></i> Admin</a>
            <a href="#" onclick="logout()" class="admin-link" id="logoutLink" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <form id="loginForm">
                <input type="password" id="adminPassword" placeholder="Enter Admin Password" required>
                <button type="submit" class="btn btn-success"><i class="fas fa-sign-in-alt"></i> Login</button>
                <div class="login-error" id="loginError">❌ Incorrect password. Please try again.</div>
            </form>
            <button onclick="closeLogin()" style="margin-top:1rem; background:transparent; border:none; color:#7d7566; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <!-- Admin Panel (hidden by default) -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2><i class="fas fa-plus-circle"></i> Add / Edit Equipment</h2>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <form id="productForm">
            <input type="hidden" id="editId" value="">
            <div class="form-row">
                <input type="text" id="itemName" placeholder="Item Name *" required>
                <select id="itemCategory" required>
                    <option value="">Select Category</option>
                    <option value="Camera Bodies">📷 Camera Bodies</option>
                    <option value="Lenses">🔎 Lenses</option>
                    <option value="Lighting">💡 Lighting</option>
                    <option value="Accessories">🎒 Accessories</option>
                </select>
                <select id="itemCondition" required>
                    <option value="Mint">Mint</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Very Good">Very Good</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                </select>
                <input type="number" id="itemRating" placeholder="Rating (0-5)" min="0" max="5" step="0.1" required>
                <input type="number" id="itemPrice" placeholder="Price in PKR *" required>
            </div>
            <div class="form-row">
                <textarea id="itemDescription" placeholder="Description" rows="2"></textarea>
                <select id="itemStatus">
                    <option value="Active">Active (Visible)</option>
                    <option value="Draft">Draft (Hidden)</option>
                    <option value="Sold">Sold (Hidden)</option>
                </select>
            </div>
            
            <!-- Photo Upload -->
            <div class="photo-upload">
                <label class="btn" style="background:#b78c5a;">
                    <i class="fas fa-camera"></i> Upload Photos (max 5)
                    <input type="file" id="photoInput" accept="image/*" multiple>
                </label>
                <span style="font-size:0.8rem; color:#7d7566; align-self:center;">Max 500KB each</span>
            </div>
            <div class="photo-preview" id="photoPreview"></div>
            
            <button type="submit" class="btn" id="submitBtn"><i class="fas fa-save"></i> Save Item</button>
            <button type="button" class="btn btn-danger" id="cancelEdit" style="display:none;">Cancel Edit</button>
        </form>
        <div id="message" style="margin-top:0.5rem; color:#1f4f3b;"></div>
    </div>

    <!-- Category Filters -->
    <div class="filter-bar">
        <span><i class="fas fa-tag"></i> Category</span>
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Camera Bodies">📷 Bodies</button>
        <button class="filter-btn" data-category="Lenses">🔎 Lenses</button>
        <button class="filter-btn" data-category="Lighting">💡 Lighting</button>
        <button class="filter-btn" data-category="Accessories">🎒 Accessories</button>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i><br>Loading gear...</div>
    </div>

    <div class="footer">
        <span>© 2026 Kamran Akram Films — used photography equipment</span>
        <span><i class="fas fa-rupee-sign"></i> PKR · Pakistan</span>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIGURATION 
// ═══════════════════════════════════════════════════════════════════

// 🔑 CHANGE THIS PASSWORD TO SOMETHING SECURE!
const ADMIN_PASSWORD = 'admin1323';  // ← CHANGE THIS!

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4v_gd5yTNfBTt9kAX8uCwZZ_c9I-jSuxJNNoOYDfn2a6kgGZlXVRJpTf8MeFVoHYUBxiIgpBF6cHR/pub?output=csv&gid=0';

// ═══════════════════════════════════════════════════════════════════
//  APPLICATION CODE
// ═══════════════════════════════════════════════════════════════════

const grid = document.getElementById('productGrid');
let allProducts = [];
let currentCategory = 'all';
let selectedFiles = [];
let isAdmin = false;

// ─── AUTHENTICATION ────────────────────────────────────────────────

function checkAuth() {
    const saved = sessionStorage.getItem('adminAuth');
    if (saved === 'true') {
        isAdmin = true;
        showAdminPanel();
    }
}

function showLogin() {
    if (isAdmin) return;
    document.getElementById('loginOverlay').classList.add('active');
    document.getElementById('adminPassword').value = '';
    document.getElementById('loginError').style.display = 'none';
}

function closeLogin() {
    document.getElementById('loginOverlay').classList.remove('active');
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const password = document.getElementById('adminPassword').value;
    if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        sessionStorage.setItem('adminAuth', 'true');
        closeLogin();
        showAdminPanel();
        document.getElementById('loginLink').style.display = 'none';
        document.getElementById('logoutLink').style.display = 'inline';
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
});

function logout() {
    isAdmin = false;
    sessionStorage.removeItem('adminAuth');
    document.getElementById('adminPanel').classList.remove('visible');
    document.getElementById('loginLink').style.display = 'inline';
    document.getElementById('logoutLink').style.display = 'none';
    renderProducts(allProducts, currentCategory);
}

function showAdminPanel() {
    document.getElementById('adminPanel').classList.add('visible');
    document.getElementById('loginLink').style.display = 'none';
    document.getElementById('logoutLink').style.display = 'inline';
    renderProducts(allProducts, currentCategory);
}

// ─── HELPERS ────────────────────────────────────────────────────────

function formatPrice(price) {
    return '₨ ' + Number(price).toLocaleString('en-PK');
}

function renderStars(rating) {
    const full = Math.floor(rating);
    const half = rating - full >= 0.5 ? 1 : 0;
    let stars = '';
    for (let i = 0; i < full; i++) stars += '<i class="fas fa-star"></i>';
    if (half) stars += '<i class="fas fa-star-half-alt"></i>';
    const empty = 5 - full - half;
    for (let i = 0; i < empty; i++) stars += '<i class="far fa-star"></i>';
    return stars;
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function compressImage(file, maxSizeMB = 0.5) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const maxDim = 800;
                if (width > height && width > maxDim) { height = height * maxDim / width; width = maxDim; }
                else if (height > maxDim) { width = width * maxDim / height; height = maxDim; }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                let quality = 0.7;
                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                while (dataUrl.length / 1024 / 1024 > maxSizeMB && quality > 0.1) {
                    quality -= 0.05;
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                }
                resolve(dataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ─── RENDER PRODUCTS ──────────────────────────────────────────────

function createCard(product, showAdmin = false) {
    const card = document.createElement('div');
    card.className = 'card';
    
    const images = product.images || [];
    const mainImage = images.length > 0 ? images[0] : '';
    const imageHTML = mainImage ? 
        `<img src="${mainImage}" class="main-image" alt="${product.name}">` :
        `<div class="main-image" style="display:flex;align-items:center;justify-content:center;color:#8a7f6e;"><i class="fas fa-camera" style="font-size:2rem;"></i></div>`;

    const statusClass = product.status === 'Active' ? 'status-badge' : 'status-badge inactive';
    
    let adminActions = '';
    if (showAdmin) {
        adminActions = `
            <div class="admin-actions">
                <button class="btn" style="background:#3498db;padding:0.2rem 0.8rem;" onclick="editItem('${product.id}')"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger" style="padding:0.2rem 0.8rem;" onclick="deleteItem('${product.id}')"><i class="fas fa-trash"></i></button>
            </div>
        `;
    }
    
    card.innerHTML = `
        ${imageHTML}
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="category-tag">${product.category || 'Misc'}</span>
            <span class="${statusClass}">${product.status || 'Draft'}</span>
        </div>
        <h3>${product.name}</h3>
        <div class="condition"><i class="fas fa-circle-check"></i> ${product.condition || 'N/A'}</div>
        <div class="rating"><span>${renderStars(product.rating || 0)}</span> ${(product.rating || 0).toFixed(1)}</div>
        <div class="price">${formatPrice(product.price)} <small>PKR</small></div>
        <div class="desc">${product.description || ''}</div>
        <div class="meta">
            <span><i class="fas fa-box"></i> used</span>
            <span><i class="fas fa-tag"></i> ${product.category || 'gear'}</span>
        </div>
        ${adminActions}
    `;
    return card;
}

function renderProducts(products, category) {
    grid.innerHTML = '';
    
    // Filter: Only show Active items for public, show all for admin
    const filtered = products.filter(p => {
        const categoryMatch = category === 'all' || (p.category || '').toLowerCase() === category.toLowerCase();
        if (isAdmin) return categoryMatch; // Admin sees all
        return categoryMatch && p.status === 'Active'; // Public sees only Active
    });

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size:2.4rem; color:#b78c5a;"></i><p style="margin-top:1rem;">No items found.</p></div>`;
        return;
    }

    filtered.forEach(product => {
        const card = createCard(product, isAdmin);
        grid.appendChild(card);
    });
}

// ─── PARSE CSV ─────────────────────────────────────────────────────

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
    if (lines.length < 2) return [];
    const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    const result = [];
    for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',').map(field => field.trim().replace(/^"|"$/g, ''));
        if (row.length < 2) continue;
        const product = {
            id: row[0] || generateId(),
            name: row[1] || 'Unnamed',
            category: row[2] || 'Other',
            condition: row[3] || 'Good',
            rating: parseFloat(row[4]) || 0,
            price: parseFloat(row[5]) || 0,
            description: row[6] || '',
            status: row[7] || 'Active',
            images: []
        };
        result.push(product);
    }
    return result;
}

// ─── LOAD DATA ─────────────────────────────────────────────────────

function loadData() {
    grid.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-pulse"></i><br>Loading gear...</div>`;
    fetch(SHEET_URL, { cache: 'no-store' })
        .then(res => { if (!res.ok) throw new Error('Failed'); return res.text(); })
        .then(csv => {
            const products = parseCSV(csv);
            if (products.length === 0) throw new Error('No data');
            allProducts = products;
            renderProducts(allProducts, currentCategory);
        })
        .catch(() => {
            // Fallback data
            allProducts = [
                { id: '1', name: 'Canon EOS R6', category: 'Camera Bodies', condition: 'Excellent', rating: 4.9, price: 285000, description: 'Full-frame mirrorless, 20MP', status: 'Active', images: [] },
                { id: '2', name: 'Sony FE 24-70mm', category: 'Lenses', condition: 'Mint', rating: 4.7, price: 189000, description: 'Professional zoom lens', status: 'Active', images: [] },
                { id: '3', name: 'Godox AD200 Pro', category: 'Lighting', condition: 'Excellent', rating: 4.8, price: 78000, description: 'Portable flash', status: 'Active', images: [] },
            ];
            renderProducts(allProducts, currentCategory);
        });
}

// ─── SAVE TO GOOGLE SHEET ─────────────────────────────────────────

function saveToSheet(products) {
    let csv = 'id,name,category,condition,rating,price,description,status\n';
    products.forEach(p => {
        csv += `${p.id},"${p.name}","${p.category}","${p.condition}",${p.rating},${p.price},"${p.description}","${p.status}"\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'equipment_data.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    document.getElementById('message').innerHTML = `
        ✅ CSV downloaded! 
        <br>📋 <strong>Instructions:</strong> 
        <br>1. Open your Google Sheet
        <br>2. Select all data (Ctrl+A) and delete it
        <br>3. Go to File → Import → Upload → Select the downloaded CSV
        <br>4. Choose "Replace current sheet"
        <br>5. Your website will auto-refresh!
    `;
}

// ─── FORM HANDLING ─────────────────────────────────────────────────

document.getElementById('productForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!isAdmin) return;
    
    const id = document.getElementById('editId').value || generateId();
    const name = document.getElementById('itemName').value.trim();
    const category = document.getElementById('itemCategory').value;
    const condition = document.getElementById('itemCondition').value;
    const rating = parseFloat(document.getElementById('itemRating').value) || 0;
    const price = parseFloat(document.getElementById('itemPrice').value) || 0;
    const description = document.getElementById('itemDescription').value.trim();
    const status = document.getElementById('itemStatus').value;
    
    if (!name || !category || !price) {
        document.getElementById('message').innerHTML = '❌ Please fill in all required fields.';
        return;
    }
    
    const imageData = [];
    for (const file of selectedFiles) {
        if (imageData.length >= 5) break;
        try {
            const compressed = await compressImage(file, 0.5);
            imageData.push(compressed);
        } catch (err) {
            console.error('Error compressing image:', err);
        }
    }
    
    const existing = allProducts.findIndex(p => p.id === id);
    const product = { id, name, category, condition, rating, price, description, status, images: imageData };
    
    if (existing >= 0) {
        allProducts[existing] = product;
        document.getElementById('message').innerHTML = '✅ Item updated successfully!';
    } else {
        allProducts.push(product);
        document.getElementById('message').innerHTML = '✅ Item added successfully!';
    }
    
    saveToSheet(allProducts);
    renderProducts(allProducts, currentCategory);
    resetForm();
});

function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('itemName').value = '';
    document.getElementById('itemCategory').value = '';
    document.getElementById('itemCondition').value = 'Excellent';
    document.getElementById('itemRating').value = '';
    document.getElementById('itemPrice').value = '';
    document.getElementById('itemDescription').value = '';
    document.getElementById('itemStatus').value = 'Active';
    document.getElementById('photoPreview').innerHTML = '';
    document.getElementById('cancelEdit').style.display = 'none';
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Save Item';
    selectedFiles = [];
}

document.getElementById('cancelEdit').addEventListener('click', resetForm);

// ─── EDIT / DELETE ─────────────────────────────────────────────────

window.editItem = function(id) {
    if (!isAdmin) return;
    const product = allProducts.find(p => p.id === id);
    if (!product) return;
    
    document.getElementById('editId').value = id;
    document.getElementById('itemName').value = product.name;
    document.getElementById('itemCategory').value = product.category;
    document.getElementById('itemCondition').value = product.condition;
    document.getElementById('itemRating').value = product.rating;
    document.getElementById('itemPrice').value = product.price;
    document.getElementById('itemDescription').value = product.description;
    document.getElementById('itemStatus').value = product.status;
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Update Item';
    document.getElementById('cancelEdit').style.display = 'inline-block';
    document.getElementById('message').innerHTML = '✏️ Editing: ' + product.name;
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.deleteItem = function(id) {
    if (!isAdmin) return;
    if (!confirm('Delete this item?')) return;
    allProducts = allProducts.filter(p => p.id !== id);
    saveToSheet(allProducts);
    renderProducts(allProducts, currentCategory);
    document.getElementById('message').innerHTML = '🗑️ Item deleted.';
};

// ─── PHOTO UPLOAD ──────────────────────────────────────────────────

document.getElementById('photoInput').addEventListener('change', async function(e) {
    const files = Array.from(e.target.files);
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    selectedFiles = [];
    
    for (const file of files) {
        if (selectedFiles.length >= 5) break;
        if (file.size > 500 * 1024) {
            document.getElementById('message').innerHTML = `⚠️ ${file.name} is too large (max 500KB)`;
            continue;
        }
        selectedFiles.push(file);
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement('img');
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
    document.getElementById('message').innerHTML = `📸 ${selectedFiles.length} photo(s) selected.`;
});

// ─── FILTERS ───────────────────────────────────────────────────────

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.category;
        renderProducts(allProducts, currentCategory);
    });
});

// ─── INIT ──────────────────────────────────────────────────────────

checkAuth();
loadData();
</script>
</body>
</html>
